# GCL 通用配置模板
# 可以复制到其他项目中使用

# 项目信息
project:
  name: "qcloud-skills"
  type: "skill-repository"  # skill-repository, code-repository, documentation
  description: "Tencent Cloud AI Agent skills"

# GCL 触发条件
trigger:
  # 关键词触发
  keywords:
    - "修复"
    - "新增"
    - "重构"
    - "变更"
    - "优化"
    - "测试"
    - "fix"
    - "add"
    - "refactor"
    - "change"
    - "optimize"
    - "test"
  
  # 文件模式触发
  file_patterns:
    - "*/SKILL.md"
    - "*/references/rubric.md"
    - "*/references/prompt-templates.md"
    - "AGENTS.md"
    - "qcloud-skill-generator/SKILL.md"
    - "docs/gcl-spec.md"
    - "docs/reflexion-memory.md"
  
  # 配置文件触发
  config_patterns:
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.toml"
    - "*.hcl"
    - "*.tf"
  
  # 代码行数阈值
  code_line_threshold: 5

# GCL 执行配置
execution:
  # 最大迭代轮次
  max_iterations: 3
  
  # Agent 配置
  agents:
    generator:
      name: "Generator Agent"
      description: "负责编码实现"
      model: "claude-3-5-sonnet"  # 可自定义
    
    critics:
      - name: "Data Quality Critic"
        description: "验证数据完整性、准确性"
        model: "gpt-4"  # 可自定义
      
      - name: "Safety Rules Critic"
        description: "验证安全规则、凭证保护"
        model: "gpt-4"
      
      - name: "Spec Compliance Critic"
        description: "验证规范符合性"
        model: "gpt-4"
      
      - name: "Token Efficiency Critic"
        description: "验证 TE-1/TE-3/TE-4/TE-5/TE-6"
        model: "gpt-4"
  
  # 架构要求
  architecture:
    use_multi_agent: true
    parallel_critics: true
    different_vendor: true  # Generator 与 Critics 必须不同厂商

# 验证配置
verification:
  # 轨迹文件路径
  trace_path: "audit-results/gcl-trace-*.json"
  
  # 验证项目
  checks:
    - name: "GCL 轨迹文件"
      required: true
    
    - name: "Multi sub-Agent 架构"
      required: true
      min_agents: 2
    
    - name: "Critic 评审"
      required: true
      min_critics: 2
    
    - name: "Git 提交标记"
      required: false
      markers: ["GCL", "gcl"]

# 输出配置
output:
  # 模型配置公示格式
  config公示:
    format: "table"  # table, json, yaml
  
  # 报告格式
  report_format: "markdown"  # markdown, json, html

# 例外情况
exceptions:
  # 无需触发 GCL 的情况
  skip_conditions:
    - "小于 5 行的 typo 修复 / 注释改动"
    - "纯文档/格式化改动"
  
  # 必须触发 GCL 的情况
  force_conditions:
    - "破坏性操作（删除、重命名）"
    - "安全相关变更"
    - "架构变更"

# 跨项目兼容性
compatibility:
  # 支持的项目类型
  supported_types:
    - "skill-repository"
    - "code-repository"
    - "documentation"
    - "infrastructure"
  
  # 可自定义的配置项
  customizable:
    - "trigger.keywords"
    - "trigger.file_patterns"
    - "execution.agents"
    - "verification.checks"

# 使用说明
usage:
  check_trigger: |
    # 检查是否需要触发 GCL
    python3 scripts/check_gcl_trigger.py "<task_description>" <file1> <file2> ...
  
  verify_execution: |
    # 验证 GCL 执行
    python3 scripts/verify_gcl_execution.py "<task_description>" <commit_hash>
  
  customize: |
    # 自定义配置
    1. 复制 gcl_config.yaml 到你的项目
    2. 修改 trigger 中的关键词和文件模式
    3. 修改 execution 中的 Agent 配置
    4. 修改 verification 中的验证项目
