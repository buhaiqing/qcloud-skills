## 7. Instance with Custom UserData

```yaml
# instance-with-userdata.yaml
instance:
  name: "app-server-01"
  type: "S5.LARGE8"
  image_id: "img-centos-7-6"
  
userdata: |
  #!/bin/bash
  # Install Docker
  yum install -y docker
  systemctl start docker
  systemctl enable docker
  
  # Install application
  docker pull myapp:latest
  docker run -d -p 80:80 myapp:latest
  
  # Disable password SSH
  sed -i 's/#PasswordAuthentication yes/PasswordAuthentication no/' /etc/ssh/sshd_config
  systemctl restart sshd
  
  # Configure monitoring agent
  wget https://monitor-agent-install.sh
  bash monitor-agent-install.sh
  
placement:
  zone: "ap-guangzhou-3"
  
network:
  vpc_id: "vpc-app-xxx"
  subnet_id: "subnet-app-xxx"
```

