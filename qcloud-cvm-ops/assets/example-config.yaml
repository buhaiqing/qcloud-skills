## 6. Multi-Instance Batch Creation

```yaml
# batch-creation.yaml
instances:
  - name: "web-01"
    type: "S5.LARGE4"
    zone: "ap-guangzhou-3"
    
  - name: "web-02"
    type: "S5.LARGE4"
    zone: "ap-guangzhou-4"  # Multi-AZ
    
  - name: "web-03"
    type: "S5.LARGE4"
    zone: "ap-guangzhou-3"

common_config:
  image_id: "img-centos-7-6"
  vpc_id: "vpc-prod-xxx"
  subnet_id: "subnet-web-xxx"
  security_groups:
    - "sg-web"
  system_disk_type: "CLOUD_PREMIUM"
  system_disk_size: 50
  
billing:
  charge_type: "POSTPAID_BY_HOUR"
  
tags:
  Environment: "Production"
  Role: "WebServer"
```

