## 4. GPU Instance (AI/ML)

```yaml
# gpu-instance.yaml
instance:
  name: "ml-training-01"
  type: "GN7.8XLARGE32"  # GPU instance type
  image_id: "img-ubuntu-18-04-gpu"
  
placement:
  zone: "ap-guangzhou-3"
  
network:
  vpc_id: "vpc-ml-xxx"
  subnet_id: "subnet-ml-xxx"
  security_groups:
    - "sg-ml-training"
  
storage:
  system_disk:
    type: "CLOUD_PREMIUM"
    size: 100
  data_disks:
    - type: "CLOUD_SSD"
      size: 2000  # Large disk for datasets
  
billing:
  charge_type: "POSTPAID_BY_HOUR"  # Pay-by-hour for variable training
  
gpu:
  count: 1
  type: "T4"
  
tags:
  Environment: "Training"
  Role: "ML-Compute"
```

