## 9. Network Configuration Examples

### Public IP Configuration

```yaml
internet_access:
  # Option 1: Pay by traffic (variable bandwidth)
  traffic_postpaid:
    charge_type: "TRAFFIC_POSTPAID_BY_HOUR"
    public_ip: true
    
  # Option 2: Pay by bandwidth (fixed bandwidth)
  bandwidth_postpaid:
    charge_type: "BANDWIDTH_POSTPAID_BY_HOUR"
    bandwidth: 10  # Mbps
    public_ip: true
    
  # Option 3: Monthly bandwidth package
  bandwidth_prepaid:
    charge_type: "BANDWIDTH_PREPAID"
    bandwidth: 20
    period: 12
```

### Security Group Configuration

```yaml
security_groups:
  web_public:
    name: "sg-web-public"
    rules:
      inbound:
        - protocol: "TCP"
          port: 80
          source: "0.0.0.0/0"
        - protocol: "TCP"
          port: 443
          source: "0.0.0.0/0"
      outbound:
        - protocol: "ALL"
          port: "ALL"
          destination: "0.0.0.0/0"
          
  ssh_restricted:
    name: "sg-ssh-restricted"
    rules:
      inbound:
        - protocol: "TCP"
          port: 22
          source: "10.0.0.0/8"  # VPC internal only
```

