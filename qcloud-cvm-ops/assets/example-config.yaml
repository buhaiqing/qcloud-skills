## 10. Tag Strategy

```yaml
tagging:
  required_tags:
    - key: "Environment"
      values: ["Production", "Staging", "Development", "Test"]
    - key: "Role"
      values: ["WebServer", "Database", "Cache", "AppServer"]
    - key: "Project"
      values: ["CorePlatform", "Analytics", "Internal"]
    - key: "ManagedBy"
      values: ["Manual", "Terraform", "Ansible", "Automation"]
      
  optional_tags:
    - key: "CostCenter"
    - key: "Owner"
    - key: "AutoShutdown"
    - key: "BackupPolicy"
```

