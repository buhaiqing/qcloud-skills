## 8. Disk Configuration Examples

### System Disk Types & Data Disk Configuration

```yaml
# Disk type definitions with anchors for reuse
cloud_basic: &disk_basic
  type: "CLOUD_BASIC"
  use_case: "Archive, backup"
  max_size: 500
  performance: "Standard"
  
cloud_premium: &disk_premium
  type: "CLOUD_PREMIUM"
  use_case: "General workloads"
  max_size: 32000
  performance: "High throughput"
  
cloud_ssd: &disk_ssd
  type: "CLOUD_SSD"
  use_case: "Database, critical apps"
  max_size: 32000
  performance: "Ultra-high IOPS"
  
cloud_hssd: &disk_hssd
  type: "CLOUD_HSSD"
  use_case: "High-performance database"
  max_size: 32000
  performance: "Maximum IOPS"

# Reference anchors in data disk config
data_disk_example:
  disks:
    - id: "disk-data-01"
      <<: *disk_ssd
      size: 1000
      delete_with_instance: true
      
    - id: "disk-backup-01"
      <<: *disk_premium
      size: 500
      delete_with_instance: false
```

