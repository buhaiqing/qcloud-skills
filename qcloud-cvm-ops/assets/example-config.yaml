# CVM Example Configuration

Example configurations for instance creation, disk management, and network setup.

---

## 1. Basic Instance Creation

```yaml
# basic-instance.yaml
instance:
  name: "web-server"
  type: "S5.LARGE4"
  image_id: "img-xxx"
  
placement:
  zone: "ap-guangzhou-3"
  
network:
  vpc_id: "vpc-xxx"
  subnet_id: "subnet-xxx"
  security_groups:
    - "sg-xxx"
  
storage:
  system_disk:
    type: "CLOUD_PREMIUM"
    size: 50
  data_disks:
    - type: "CLOUD_PREMIUM"
      size: 100
  
billing:
  charge_type: "POSTPAID_BY_HOUR"
  
tags:
  Environment: "Production"
  ManagedBy: "Automation"
```

---

## 2. Production Web Server

```yaml
# production-web.yaml
instance:
  name: "prod-web-01"
  type: "S5.2XLARGE16"  # 8 vCPU, 16 GB
  image_id: "img-centos-7-6"
  
placement:
  zone: "ap-guangzhou-3"
  
network:
  vpc_id: "vpc-prod-xxx"
  subnet_id: "subnet-web-xxx"
  security_groups:
    - "sg-web-public"
    - "sg-web-internal"
  public_ip: true
  bandwidth:
    type: "BANDWIDTH_PREPAID"
    size: 10  # Mbps
  
storage:
  system_disk:
    type: "CLOUD_SSD"
    size: 100
  data_disks:
    - type: "CLOUD_SSD"
      size: 500
  
billing:
  charge_type: "PREPAID"
  period: 12  # Monthly prepaid
  
login:
  key_ids:
    - "skey-prod-xxx"
  
auto_recovery:
  enabled: true
  
monitoring:
  enabled: true
  
tags:
  Environment: "Production"
  Role: "WebServer"
  Project: "CorePlatform"
```

---

## 3. Database Server (MySQL Backend)

```yaml
# database-server.yaml
instance:
  name: "db-master-01"
  type: "M5.4XLARGE64"  # 16 vCPU, 64 GB (Memory optimized)
  image_id: "img-centos-7-6"
  
placement:
  zone: "ap-guangzhou-3"
  
network:
  vpc_id: "vpc-prod-xxx"
  subnet_id: "subnet-db-xxx"
  security_groups:
    - "sg-db-private"
  public_ip: false  # No public IP for DB
  
storage:
  system_disk:
    type: "CLOUD_SSD"
    size: 50
  data_disks:
    - type: "CLOUD_HSSD"  # Enhanced SSD for high IOPS
      size: 1000
    - type: "CLOUD_HSSD"
      size: 1000  # Second disk for backup/logs
  
billing:
  charge_type: "PREPAID"
  period: 12
  
login:
  key_ids:
    - "skey-db-admin"
  
tags:
  Environment: "Production"
  Role: "Database"
  Type: "MySQL-Master"
```

