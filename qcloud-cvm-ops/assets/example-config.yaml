## 5. Dev/Test Instance

```yaml
# dev-instance.yaml
instance:
  name: "dev-web-01"
  type: "S5.SMALL2"  # Small instance for dev
  image_id: "img-centos-7-6"
  
placement:
  zone: "ap-guangzhou-3"
  
network:
  vpc_id: "vpc-dev-xxx"
  subnet_id: "subnet-dev-xxx"
  security_groups:
    - "sg-dev-open"
  public_ip: true
  bandwidth:
    type: "TRAFFIC_POSTPAID_BY_HOUR"
  
storage:
  system_disk:
    type: "CLOUD_BASIC"
