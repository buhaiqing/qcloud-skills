name: Pattern Anomaly Detection (Daily)

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 02:00 UTC
  workflow_dispatch:

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install ruff

      - name: Detect emerging failure patterns
        run: python3 scripts/pattern_anomaly_detect.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pattern-anomaly-results
          path: audit-results/pattern-anomaly-*.json
