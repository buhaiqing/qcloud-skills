name: Validate Skills

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate SKILL.md frontmatter
        run: python3 scripts/validate_skills_frontmatter.py

      - name: Validate Well-Architected worker JSON examples
        run: python3 scripts/validate_product_assessment.py

      - name: GCL runner smoke test (structural critic, dry command)
        run: |
          python3 scripts/gcl_runner.py run \
            --skill qcloud-well-architected-review \
            --request "CI smoke test" \
            --command 'echo {"Response":{"RequestId":"ci-smoke"}}' \
            --max-iter 1 \
            --structural-critic-only
