name: Validate Skills

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ruff Python lint
        uses: astral-sh/ruff-action@v3
        with:
          version: 0.11.8
          args: check --output-format=github .

      - name: Validate SKILL.md frontmatter
        run: python3 scripts/validate_skills_frontmatter.py

      - name: Validate Well-Architected worker JSON examples
        run: python3 scripts/validate_product_assessment.py

      - name: Validate Markdown local links
        run: python3 scripts/check_markdown_links.py

      - name: GCL runner smoke test (structural critic, dry command)
        run: |
          python3 scripts/gcl_runner.py run \
            --skill qcloud-well-architected-review \
            --request "CI smoke test" \
            --command 'echo {"Response":{"RequestId":"ci-smoke"}}' \
            --max-iter 1 \
            --structural-critic-only
          python3 scripts/gcl_trace_aggregate.py --since-hours 168

      - name: Script unit tests
        run: |
          cd scripts && python3 -m unittest discover -p "*_test.py" -v

      - name: GCL alarm wire plan (no mutations)
        run: |
          python3 scripts/gcl_alarm_wire.py plan \
            --summary scripts/fixtures/gcl-quality-summary-healthy.json

      - name: GCL Tier-A conformance (Charter C7)
        run: |
          python3 scripts/check_gcl_conformance.py

      - name: Pattern anomaly detection (non-blocking alerts)
        run: |
          python3 scripts/pattern_anomaly_detect.py | tee audit-results/pattern-anomaly-$(date +%Y%m%d).json || true
        continue-on-error: true
        # NOTE: script outputs to stdout/stderr only; does not block merges
