## Security Settings

### CAM Policy Template

```json
{
  "version": "2.0",
  "statement": [
    {
      "action": [
        "[product]:Describe*",
        "[product]:Create*",
        "[product]:Modify*",
        "[product]:Delete*"
      ],
      "effect": "allow",
      "resource": "qcs:[product]:[region]:*:/*"
    },
    {
      "action": [
        "monitor:GetMonitorData",
        "cam:ListUsers",
        "cam:ListRoles"
      ],
      "effect": "allow",
      "resource": "*"
    }
  ]
}
```

### Credential Security

```yaml
credential_security:
  # Never expose these patterns
  forbidden_patterns:
    - "echo $TENCENTCLOUD_SECRET_KEY"
    - "print(secret_key)"
    - "cat ~/.tccli/config"
    
  # Masking format
  mask_format: "<masked>"
  
  # Verification (check existence only)
  safe_verification:
    bash: "test -n '$TENCENTCLOUD_SECRET_KEY'"
    python: "os.environ.get('TENCENTCLOUD_SECRET_KEY') != ''"
```

