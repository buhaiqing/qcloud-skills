# Example Configuration

Example configuration with UX and optimization settings for qcloud-[product]-ops.

---

## Credential Configuration

### Environment Variables (Recommended)

```bash
# Tencent Cloud credentials
export TENCENTCLOUD_SECRET_ID="<YOUR_TENCENT_CLOUD_SECRET_ID>"
export TENCENTCLOUD_SECRET_KEY="<YOUR_TENCENT_CLOUD_SECRET_KEY>"
export TENCENTCLOUD_REGION="ap-guangzhou"

# Optional: Output format
export TENCENTCLOUD_OUTPUT="json"

# Optional: Language
export TENCENTCLOUD_LANG="zh-CN"
```

### Config File Configuration

```yaml
# ~/.tccli/config
default:
  secretId: <YOUR_TENCENT_CLOUD_SECRET_ID>
  secretKey: <YOUR_TENCENT_CLOUD_SECRET_KEY>
  region: ap-guangzhou
  output: json
  lang: zh-CN

# Multiple profiles
profile_prod:
  secretId: AKID_prod_xxxx
  secretKey: prod_xxxx
  region: ap-guangzhou

profile_dev:
  secretId: AKID_dev_xxxx
  secretKey: dev_xxxx
  region: ap-shanghai

profile_hk:
  secretId: AKID_hk_xxxx
  secretKey: hk_xxxx
  region: ap-hongkong
```

