## Skill Execution Settings

### Operation Defaults

```yaml
# skill-config.yaml
defaults:
  region: ap-guangzhou  # Default region if not specified
  
  create:
    wait_timeout: 300   # Max wait time for create operations (seconds)
    poll_interval: 5    # Polling interval (seconds)
    
  delete:
    require_confirmation: true  # ALWAYS require confirmation
    suggest_backup: true        # Suggest backup before delete
    
  describe:
    max_results: 100    # Max items per request
    pagination: true    # Enable pagination
    
  modify:
    require_confirmation: true  # Require confirmation for changes
```

### Prompt Settings

```yaml
prompt_settings:
  # Maximum prompts before execution
  max_prompts:
    create: 2      # Ask for required fields only
    describe: 0    # No prompts for read-only
    modify: 1      # Confirm changes
    delete: 1      # Confirm deletion
    
  # Smart defaults
  smart_defaults:
    instance_type: S5.SMALL1  # Default instance type
    disk_size: 50            # Default disk size (GB)
    disk_type: CLOUD_PREMIUM # Default disk type
```

