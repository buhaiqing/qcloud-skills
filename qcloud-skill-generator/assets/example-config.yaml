## Optimization Settings

### Capacity Planning

```yaml
capacity_planning:
  # Recommended sizing based on workload
  sizing_recommendations:
    light:
      cpu: 2
      memory: 4GB
      disk: 50GB
      
    medium:
      cpu: 4
      memory: 8GB
      disk: 100GB
      
    heavy:
      cpu: 8
      memory: 16GB
      disk: 200GB
      
  # Right-sizing thresholds
  right_sizing:
    cpu_low_threshold: 10    # Downsize if CPU < 10%
    cpu_high_threshold: 80   # Upsize if CPU > 80%
    mem_low_threshold: 20    # Downsize if Mem < 20%
    mem_high_threshold: 85   # Upsize if Mem > 85%
```

### Cost Optimization

```yaml
cost_optimization:
  # Reserved instance recommendations
  reserved_instance:
    threshold_hours: 720  # Recommend reserved if running > 720h/month
    
  # Spot instance eligibility
  spot_instance:
    eligible_workloads:
      - batch_processing
      - dev_testing
      - stateless_services
      
  # Idle resource detection
  idle_detection:
    stopped_threshold_days: 7   # Alert if stopped > 7 days
    low_utilization_threshold: 10  # Alert if utilization < 10%
```

