## Integration Settings

### Cross-Skill Delegation

```yaml
delegation:
  # When to delegate to other skills
  rules:
    - condition: "disk_issue_detected"
      delegate_to: "qcloud-cbs-ops"
      
    - condition: "vpc_issue_detected"
      delegate_to: "qcloud-vpc-ops"
      
    - condition: "loadbalancer_issue_detected"
      delegate_to: "qcloud-clb-ops"
```

---

## Logging Settings

```yaml
logging:
  level: INFO
  
  # What to log
  log_items:
    - request_id
    - operation
    - resource_id
    - duration
    - success/failure
    
  # Never log
  forbidden_log_items:
    - TENCENTCLOUD_SECRET_KEY
    - SecretKey
    - password
    - token
```