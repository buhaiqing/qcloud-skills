## Monitoring Settings

### Threshold Configuration

```yaml
thresholds:
  # CPU thresholds
  cpu_usage:
    high: 90      # Alert threshold
    medium: 70    # Warning threshold
    low: 50       # Attention threshold
    
  # Memory thresholds
  mem_usage:
    high: 90
    medium: 75
    low: 60
    
  # Disk thresholds
  disk_usage:
    high: 95
    medium: 80
    low: 70
    
  # Network thresholds (bandwidth usage %)
  network_usage:
    high: 90
    medium: 70
    low: 50
```

### Proactive Inspection Settings

```yaml
proactive_inspection:
  enabled: true
  
  schedule:
    daily: "02:00"    # Daily at 2 AM
    weekly: "Sun 03:00"  # Weekly Sunday 3 AM
    monthly: "1st 04:00" # Monthly 1st at 4 AM
    
  scope:
    regions:
      - ap-guangzhou
      - ap-shanghai
      
    resource_types:
      - CVM
      - CBS
      - MySQL
      
  alert_rules:
    capacity_projection: true    # Alert on capacity projection
    baseline_shift: true         # Alert on baseline changes
    anomaly_detection: true      # Alert on detected anomalies
```

