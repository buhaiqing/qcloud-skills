## UX Settings

### Feedback Format

```yaml
feedback:
  # Success feedback
  success_format: |
    ✅ {operation} completed successfully
    
    Details:
    - Resource ID: {resource_id}
    - Status: {status}
    - Duration: {duration}s
    
  # Progress feedback (for operations > 5s)
  progress_format: |
    ⏳ {operation} in progress...
    [{current}/{total}] Status: {status} ({elapsed}s)
    
  # Error feedback
  error_format: |
    [ERROR] {code}: {summary}
    
    What happened: {explanation}
    How to fix: {fix_steps}
    Next step: {next_action}
```

### Safety Gates

```yaml
safety_gates:
  destructive_operations:
    - delete
    - terminate
    - release
    
  confirmation_required:
    message: |
      ⚠️ **Confirm Destructive Operation**
      
      You are about to:
      - **Action**: {action} (irreversible)
      - **Resource**: {resource_type}
      - **Name**: {resource_name}
      - **ID**: {resource_id}
      
      Type "CONFIRM" to proceed.
      
  backup_reminder:
    message: |
      💡 **Backup Reminder**
      
      Before {operation}, consider creating a backup.
      
      Would you like to create a backup first?
```

